    function resolveMatchOutcome(r, t1, t2) {
      if (!hasScore(r) || !t1 || !t2) return null;
      const g1 = parseInt(r.g1);
      const g2 = parseInt(r.g2);
      if (g1 > g2) return { winner: t1, loser: t2, decided: true };
      if (g2 > g1) return { winner: t2, loser: t1, decided: true };
      if (!r.penWinner) return null;
      const winner = r.penWinner === t1 ? t1 : t2;
      const loser = winner === t1 ? t2 : t1;
      return { winner, loser, decided: true, onPens: true };
    }

            if (!hasScore(r)) return;
            const g1 = parseInt(r.g1), g2 = parseInt(r.g2);
            if (isNaN(g1) || isNaN(g2)) return;
            stats[m.t1].PJ++; stats[m.t2].PJ++;
            stats[m.t1].GF += g1; stats[m.t1].GC += g2;
            stats[m.t2].GF += g2; stats[m.t2].GC += g1;
            if (g1 > g2) { stats[m.t1].PG++; stats[m.t1].PTS += 3; stats[m.t2].PP++; }
            else if (g2 > g1) { stats[m.t2].PG++; stats[m.t2].PTS += 3; stats[m.t1].PP++; }
            else if (r.penWinner) {
              stats[m.t1].PE++; stats[m.t2].PE++;
              if (r.penWinner === m.t1) { stats[m.t1].PTS += 2; stats[m.t2].PTS += 1; }
              else { stats[m.t2].PTS += 2; stats[m.t1].PTS += 1; }
            }
          });
          teams.forEach(t => stats[t].DIF = stats[t].GF - stats[t].GC);
          all[gid] = Object.values(stats).sort((a,b) =>
            b.PTS - a.PTS || b.DIF - a.DIF || b.GF - a.GF || a.team.localeCompare(b.team)
          );
        }
        return all;
      }, [results]);

      const isGroupComplete = (gid) => GROUP_MATCHES.filter(m => m.group === gid).every(m => {
        const r = results[m.id];
        if (!hasScore(r)) return false;
        if (parseInt(r.g1) === parseInt(r.g2)) return !!r.penWinner;
        return true;
      });

      const resolveSlot = (slot) => {
        if (!slot) return null;
        if (slot.type === 'group') {
          if (!isGroupComplete(slot.group)) return null;
          return groupStandings[slot.group][slot.pos - 1]?.team || null;
        }
        if (slot.type === 'winner' || slot.type === 'loser') {
          const m = KNOCKOUT_MATCHES.find(k => k.id === slot.match);
          const t1 = resolveSlot(m.slot1);
          const t2 = resolveSlot(m.slot2);
          const r = results[slot.match];
          const out = resolveMatchOutcome(r, t1, t2);
          if (!out) return null;
          return slot.type === 'winner' ? out.winner : out.loser;
        }
        return null;
      };

      const slotLabel = (slot) => {
        if (slot.type === 'group') return `${slot.pos}º ${slot.group}`;
        const m = KNOCKOUT_MATCHES.find(k => k.id === slot.match);
        const prefix = slot.type === 'winner' ? 'Gan.' : 'Per.';
        if (m.label) return `${prefix} ${m.label}`;
        return `${prefix} ${m.time}`;
      };

      const finalStandings = useMemo(() => {
        const positions = {};
        const final = KNOCKOUT_MATCHES.find(m => m.id === 'f5_final');
        const finalT1 = resolveSlot(final.slot1);
        const finalT2 = resolveSlot(final.slot2);
        const finalOut = resolveMatchOutcome(results[final.id], finalT1, finalT2);
        if (finalOut) { positions[1] = finalOut.winner; positions[2] = finalOut.loser; }
        const placementMap = [
          { id: 'f4_c2', winPos: 3, losePos: 4 },
          { id: 'f4_c1', winPos: 5, losePos: 6 },
          { id: 'f3_c3', winPos: 7, losePos: 8 },
          { id: 'f3_c2', winPos: 9, losePos: 10 },
          { id: 'f3_c1', winPos: 11, losePos: 12 },
        ];
        placementMap.forEach(p => {
          const m = KNOCKOUT_MATCHES.find(k => k.id === p.id);
          const t1 = resolveSlot(m.slot1);
          const t2 = resolveSlot(m.slot2);
          const out = resolveMatchOutcome(results[p.id], t1, t2);
          if (out) { positions[p.winPos] = out.winner; positions[p.losePos] = out.loser; }
        });
        return positions;
      }, [results, groupStandings]);

      return (
        <div className="min-h-screen bg-slate-50 text-slate-900 pb-12">
          <header className="bg-gradient-to-r from-sky-800 to-teal-500 text-white sticky top-0 z-10 shadow-lg">
            <div className="px-4 py-3 max-w-3xl mx-auto">
              <div className="flex items-center justify-between gap-2">
                <div>
                  <h1 className="text-lg font-bold tracking-wide">17ª Torneo Chupete</h1>
                  <p className="text-xs text-teal-100">1 de mayo · Miquel Nadal</p>
                </div>
                <button
                  onClick={() => setShowReset(true)}
                  className="text-teal-100 hover:text-white p-2 rounded-full hover:bg-white/10 transition"
                  title="Resetear resultados"
                >
                  <IconReset size={18} />
                </button>
              </div>
            </div>
            <div className="flex border-t border-white/10 max-w-3xl mx-auto">
              {[
                { id: 'grupos', label: 'Grupos', icon: IconUsers },
                { id: 'cruces', label: 'Cruces', icon: IconSwords },
                { id: 'final', label: 'Clasif.', icon: IconMedal },
              ].map(t => {
                const IC = t.icon;
                const active = activeTab === t.id;
                return (
                  <button
                    key={t.id}
                    onClick={() => setActiveTab(t.id)}
                    className={`flex-1 flex items-center justify-center gap-1.5 py-2.5 text-sm font-semibold transition ${
                      active ? 'bg-white/15 border-b-2 border-white' : 'text-teal-100 hover:bg-white/5'
                    }`}
                  >
                    <IC size={15} />
                    {t.label}
                  </button>
                );
              })}
            </div>
          </header>

          <div className="max-w-3xl mx-auto px-3 pt-4 space-y-5">
            {activeTab === 'grupos' && (
              <>
                <div className="bg-white rounded-xl p-3 border border-slate-200 text-xs text-slate-600">
                  <strong className="text-slate-800 block mb-1">Puntuación</strong>
                  Victoria <span className="font-bold text-emerald-600">3 pts</span> · Gana penaltis <span className="font-bold text-sky-600">2 pts</span> · Pierde penaltis <span className="font-bold text-amber-600">1 pt</span> · Derrota <span className="font-bold text-slate-400">0 pts</span>
                </div>
                {['G1','G2','G3','G4'].map(gid => (
                  <GroupCard
                    key={gid}
                    groupId={gid}
                    matches={GROUP_MATCHES.filter(m => m.group === gid)}
                    standings={groupStandings[gid]}
                    results={results}
                    updateResult={updateResult}
                  />
                ))}
              </>
            )}

            {activeTab === 'cruces' && (
              <KnockoutView
                results={results}
                updateResult={updateResult}
                resolveSlot={resolveSlot}
                slotLabel={slotLabel}
              />
            )}

            {activeTab === 'final' && (
              <FinalStandings positions={finalStandings} />
            )}
          </div>

          {showReset && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-20 p-4" onClick={() => setShowReset(false)}>
              <div className="bg-white rounded-2xl p-5 max-w-sm w-full shadow-2xl" onClick={e => e.stopPropagation()}>
                <h3 className="font-bold text-lg mb-2">¿Borrar todos los resultados?</h3>
                <p className="text-sm text-slate-600 mb-4">Esta acción no se puede deshacer.</p>
                <div className="flex gap-2">
                  <button onClick={() => setShowReset(false)} className="flex-1 py-2 rounded-lg border border-slate-300 font-semibold">Cancelar</button>
                  <button onClick={resetAll} className="flex-1 py-2 rounded-lg bg-red-500 text-white font-semibold">Borrar todo</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function GroupCard({ groupId, matches, standings, results, updateResult }) {
      return (
        <div className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
          <div className={`${GROUP_COLORS[groupId]} text-white px-4 py-2 font-bold tracking-wide text-sm`}>
            Grupo {groupId.slice(1)}
          </div>
          <div className="px-2 pt-3 overflow-x-auto">
            <table className="w-full text-xs min-w-[380px]">
              <thead>
                <tr className="text-slate-500 border-b border-slate-100">
                  <th className="text-left py-1 pl-2 font-semibold w-6">#</th>
                  <th className="text-left py-1 font-semibold" colSpan={2}>Equipo</th>
                  <th className="py-1 font-semibold">PJ</th>
                  <th className="py-1 font-semibold">G</th>
                  <th className="py-1 font-semibold">E</th>
                  <th className="py-1 font-semibold">P</th>
                  <th className="py-1 font-semibold">GF</th>
                  <th className="py-1 font-semibold">GC</th>
                  <th className="py-1 font-semibold">DIF</th>
                  <th className="py-1 pr-2 font-bold text-slate-700">PTS</th>
                </tr>
              </thead>
              <tbody>
                {standings.map((s, i) => (
                  <tr key={s.team} className={`${i === 0 ? 'bg-emerald-50' : i === 1 ? 'bg-sky-50' : 'bg-slate-50/50'} border-b border-slate-50 last:border-0`}>
                    <td className="pl-2 py-1.5 font-bold text-slate-400">{i+1}</td>
                    <td className="py-1.5 pr-1 w-6"><Shield team={s.team} size={22} /></td>
                    <td className="py-1.5 font-semibold text-slate-800 whitespace-nowrap">{TEAMS[s.team]?.short || s.team}</td>
                    <td className="py-1.5 text-center">{s.PJ}</td>
                    <td className="py-1.5 text-center">{s.PG}</td>
                    <td className="py-1.5 text-center">{s.PE}</td>
                    <td className="py-1.5 text-center">{s.PP}</td>
                    <td className="py-1.5 text-center">{s.GF}</td>
                    <td className="py-1.5 text-center">{s.GC}</td>
                    <td className="py-1.5 text-center font-semibold">{s.DIF > 0 ? '+' : ''}{s.DIF}</td>
                    <td className="pr-2 py-1.5 text-center font-bold text-slate-900">{s.PTS}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="p-3 space-y-2">
            {matches.map(m => (
              <MatchRow
                key={m.id}
                match={m}
                t1={m.t1}
                t2={m.t2}
                result={results[m.id]}
                updateResult={updateResult}
                allowPens
              />
            ))}
          </div>
        </div>
      );
    }

    function MatchRow({ match, t1, t2, result, updateResult, allowPens = true, placeholder1, placeholder2 }) {
      const r = result || {};
      const decided = hasScore(r) && (parseInt(r.g1) !== parseInt(r.g2) || r.penWinner);
      const tied = isTied(r);
      const canPlay = !!(t1 && t2);

      const nameOf = (team, placeholder) => {
        if (!team) return <span className="text-slate-400 italic text-xs">{placeholder || '—'}</span>;
        const info = TEAMS[team];
        return <span className="truncate">{info?.short || team}</span>;
      };

      return (
        <div className={`rounded-lg border ${decided ? 'border-emerald-200 bg-emerald-50/50' : 'border-slate-200 bg-slate-50/60'} p-2.5`}>
          <div className="flex items-center justify-between text-[11px] text-slate-500 mb-1.5">
            <div className="flex items-center gap-1 flex-wrap">
              <IconClock size={11} />
              <span className="font-semibold">{match.time}</span>
              <span className="text-slate-400">·</span>
              <span>{match.field}</span>
              {match.forPositions && <span className="ml-1 px-1.5 py-0.5 rounded bg-slate-200 text-slate-700 font-semibold">{match.forPositions}</span>}
            </div>
            {decided ? <IconCheck size={13} className="text-emerald-500 flex-shrink-0" /> : null}
          </div>
          <div className="flex items-center justify-center gap-3 flex-wrap">
            <div className="flex items-center gap-1.5 justify-end min-w-0 max-w-[40%]">
              <Shield team={t1} size={26} className="flex-shrink-0" />
              <div className="text-left text-sm font-semibold text-slate-800 min-w-0 truncate">
                {nameOf(t1, placeholder1)}
              </div>
            </div>
            <div className="flex items-center gap-1.5 flex-shrink-0">
              <input
                type="number"
                inputMode="numeric"
                min="0"
                max="99"
                value={r.g1 ?? ''}
                disabled={!canPlay}
                onChange={e => updateResult(match.id, 'g1', e.target.value)}
                className="w-10 h-10 text-center text-lg font-bold rounded-lg border border-slate-300 bg-white disabled:bg-slate-100 disabled:text-slate-300 focus:outline-none focus:ring-2 focus:ring-teal-400"
              />
              <span className="text-slate-400 font-bold">-</span>
              <input
                type="number"
                inputMode="numeric"
                min="0"
                max="99"
                value={r.g2 ?? ''}
                disabled={!canPlay}
                onChange={e => updateResult(match.id, 'g2', e.target.value)}
                className="w-10 h-10 text-center text-lg font-bold rounded-lg border border-slate-300 bg-white disabled:bg-slate-100 disabled:text-slate-300 focus:outline-none focus:ring-2 focus:ring-teal-400"
              />
            </div>
            <div className="flex items-center gap-1.5 justify-start min-w-0 max-w-[40%]">
              <Shield team={t2} size={26} className="flex-shrink-0" />
              <div className="text-left text-sm font-semibold text-slate-800 min-w-0 truncate">
                {nameOf(t2, placeholder2)}
              </div>
            </div>
          </div>
          {tied && canPlay && allowPens && (
            <div className="mt-2 pt-2 border-t border-slate-200">
              <div className="text-[11px] text-slate-500 font-semibold mb-1.5 text-center">EMPATE · ¿Quién ganó los penaltis?</div>
              <div className="grid grid-cols-2 gap-1.5">
                <button
                  onClick={() => updateResult(match.id, 'penWinner', t1)}
                  className={`py-1.5 text-xs font-semibold rounded-lg border transition flex items-center justify-center gap-1.5 ${
                    r.penWinner === t1
                      ? 'bg-teal-500 text-white border-teal-500'
                      : 'bg-white text-slate-700 border-slate-300 hover:border-teal-400'
                  }`}
                >
                  <Shield team={t1} size={18} />
                  <span className="truncate">{TEAMS[t1]?.short || t1}</span>
                </button>
                <button
                  onClick={() => updateResult(match.id, 'penWinner', t2)}
                  className={`py-1.5 text-xs font-semibold rounded-lg border transition flex items-center justify-center gap-1.5 ${
                    r.penWinner === t2
                      ? 'bg-teal-500 text-white border-teal-500'
                      : 'bg-white text-slate-700 border-slate-300 hover:border-teal-400'
                  }`}
                >
                  <Shield team={t2} size={18} />
                  <span className="truncate">{TEAMS[t2]?.short || t2}</span>
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function KnockoutView({ results, updateResult, resolveSlot, slotLabel }) {
      const phases = [
        { num: 2, title: '2ª Fase · Cruces iniciales', desc: 'Cruces según posición en grupos' },
        { num: 3, title: '3ª Fase · Puestos 7º-12º', desc: 'Definen clasificación media-baja' },
        { num: 4, title: '4ª Fase · Puestos 3º-6º', desc: 'Definen podio y 5º-6º' },
        { num: 5, title: '5ª Fase · GRAN FINAL', desc: 'Por el título' },
      ];

      return (
        <div className="space-y-4">
          {phases.map(phase => {
            const phaseMatches = KNOCKOUT_MATCHES.filter(m => m.phase === phase.num);
            return (
              <div key={phase.num} className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
                <div className="bg-gradient-to-r from-sky-800 to-teal-500 text-white px-4 py-2.5">
                  <div className="font-bold tracking-wide text-sm flex items-center gap-2">
                    {phase.num === 5 && <IconStar size={14} className="text-yellow-300" />}
                    {phase.title}
                  </div>
                  <div className="text-xs text-teal-100 mt-0.5">{phase.desc}</div>
                </div>
                <div className="p-3 space-y-2">
                  {phaseMatches.map(m => {
                    const t1 = resolveSlot(m.slot1);
                    const t2 = resolveSlot(m.slot2);
                    return (
                      <MatchRow
                        key={m.id}
                        match={m}
                        t1={t1}
                        t2={t2}
                        placeholder1={slotLabel(m.slot1)}
                        placeholder2={slotLabel(m.slot2)}
                        result={results[m.id]}
                        updateResult={updateResult}
                      />
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    function FinalStandings({ positions }) {
      const medalEmoji = { 1: '🥇', 2: '🥈', 3: '🥉' };
      const rowStyle = (pos) => {
        if (pos === 1) return 'bg-gradient-to-r from-yellow-100 to-yellow-50 border-yellow-300';
        if (pos === 2) return 'bg-gradient-to-r from-slate-100 to-slate-50 border-slate-300';
        if (pos === 3) return 'bg-gradient-to-r from-orange-100 to-orange-50 border-orange-300';
        return 'bg-white border-slate-200';
      };

      const totalFilled = Object.keys(positions).length;

      return (
        <div className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
          <div className="bg-gradient-to-r from-sky-800 to-teal-500 text-white px-4 py-3">
            <div className="flex items-center gap-2">
              <IconTrophy size={18} />
              <div>
                <div className="font-bold tracking-wide">Clasificación final</div>
                <div className="text-xs text-teal-100">{totalFilled}/12 posiciones definidas</div>
              </div>
            </div>
          </div>
          <div className="p-3 space-y-1.5">
            {Array.from({ length: 12 }, (_, i) => i + 1).map(pos => {
              const team = positions[pos];
              return (
                <div key={pos} className={`rounded-lg border px-3 py-2.5 flex items-center gap-3 ${rowStyle(pos)}`}>
                  <div className={`text-xl font-bold w-8 text-center ${pos <= 3 ? 'text-slate-800' : 'text-slate-400'}`}>
                    {medalEmoji[pos] || pos + 'º'}
                  </div>
                  {team ? (
                    <>
                      <Shield team={team} size={32} className="flex-shrink-0" />
                      <div className="flex-1 min-w-0">
                        <div className="font-bold text-slate-800 text-sm truncate">{TEAMS[team]?.full || team}</div>
                      </div>
                    </>
                  ) : (
                    <div className="flex-1 font-semibold text-slate-300 italic text-sm">Pendiente…</div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
